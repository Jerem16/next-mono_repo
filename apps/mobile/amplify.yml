version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - yarn -v
        - yarn install --immutable
    build:
      commands:
        - yarn typecheck
        - yarn lint
        - yarn build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .yarn/cache/**/*
      - .yarn/install-state.gz
      - .next/cache/**/*
customHeaders:
  - pattern: "/img/**"
    headers:
      - key: Cache-Control
        value: "public, max-age=31536000, immutable"
  - pattern: "/css/**"
    headers:
      - key: Cache-Control
        value: "public, max-age=31536000, immutable"
